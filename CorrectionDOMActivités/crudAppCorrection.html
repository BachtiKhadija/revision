<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/2.1.2/sweetalert.min.js" integrity="sha512-AA1Bzp5Q0K1KanKKmvN/4d3IRKVlv9PYgwFPvm32nPO6QS8yH1HO7LbgB1pgiOxPtfeg5zEn2ba64MUcqJx6CA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

</head>
<body>
    <div class="container my-3 p-3" >
        <h1>Gestion de produits</h1>
        <div class="row gap-2">
            <div class="col"><input type="text" class="form-control" placeholder="nom" id="nom"></div>
    <div class="col"><input type="number" min="100" max="5000" step="0.01" class="form-control" placeholder="Saisir le prix" id="prix"></div>
        
       
        <div class="col"><button type="button" class="btn btn-primary w-100" onclick="AddNew()">Ajouter</button></div>
    </div>
    <table class="table table-hover my-3 mx-auto myTable">
       <thead> <tr><th>nom</th><th>prix</th><th>action</th></tr></thead>
       <tbody></tbody>
    </table>
    

    <script type="text/javascript">
        function deleteP(e){
            //sweet 
            if(confirm('voulez vous vraiement supprimer ????')){
                 e.target.parentElement.parentElement.remove();
            }
        }
        function editP(e){
            //sweet 
            let nom=document.querySelector('#nom');
          nom.value= e.target.parentElement.parentElement.children[0].textContent;
        }
      function AddNew(){
          let nom=document.querySelector('#nom').value;
          let prix=document.querySelector('#prix').value;
          if(nom.trim()===""){
            Swal.fire({
                    icon: "error",
                    title: "Erreur",
                    text: "Vous saisir le nom!!!",
                    footer: '<a href="#">Why do I have this issue?</a>'
                    });
            return;}
          let newRow=document.createElement('tr');
          newRow.innerHTML=`<td>${nom}</td><td>${prix}</td><td>
            <button type="button" class="btn btn-sm btn-warning" onclick="editP(event)">Edit</button>
             <button type="button" class="btn btn-sm btn-danger" onclick="deleteP(event)" >delete</button>
            </td>`;

            document.querySelector('.myTable tbody').appendChild(newRow);
          document.querySelector('#nom').value='';
          document.querySelector('#prix').value=100;

      }



    </script>
</body>
</html>
