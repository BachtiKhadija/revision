<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    
    <div>
        <input type="text"  onchange="addTask(this)">
    </div>
    <ul id="tasks"></ul>

     <script type="text/javascript">
     
        function addTask(inpt){
           
           let newItem=`<li class="a">${inpt.value}</li>`;
           document.getElementById('tasks').insertAdjacentHTML('afterbegin',newItem);
                document.querySelectorAll('.a').forEach(function(item,pos){
            item.addEventListener('click',function(e){
                e.target.style.color="red";

            });
    })
    
    }
 
  
     </script>


</body>
</html>
